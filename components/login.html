<div class="login-wrapper">
  
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">SD</div>
      <h1 class="login-title">ServiceDesk AI</h1>
      <p class="login-subtitle">Enterprise Support Portal</p>
    </div>

    <form id="loginForm">
      <!-- Role Selection -->
      <span class="role-label">Select Your Role</span>
      <div class="role-grid">
        <button type="button" class="role-btn active" data-role="employee">
          <i class="ph ph-user"></i> Employee
        </button>
        <button type="button" class="role-btn" data-role="service_agent">
          <i class="ph ph-headset"></i> Service Agent
        </button>
        <button type="button" class="role-btn" data-role="manager">
          <i class="ph ph-chart-line-up"></i> Manager
        </button>
        <button type="button" class="role-btn" data-role="admin">
          <i class="ph ph-shield-check"></i> System Admin
        </button>
      </div>

      <!-- Inputs -->
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="ph ph-envelope-simple"></i>
          <input type="email" id="email" name="email" class="form-control" placeholder="name@company.com" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Password
          <a href="#" class="forgot-link">Forgot Password?</a>
        </label>
        <div class="input-wrapper">
          <i class="ph ph-lock-key"></i>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required />
          <i class="ph ph-eye toggle-pw" title="Toggle visibility"></i>
        </div>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>
  </div>
</div>

<!-- components/chat-box.html -->
<div class="card">
  <h2>AI Assistant & Team Chat</h2>
  <div id="chatWindow" style="height:300px;overflow-y:auto;background:var(--color-surface);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;">
    <!-- Messages will be appended here -->
  </div>
  <form id="chatForm" style="display:flex;gap:0.5rem;">
    <input type="text" id="chatInput" placeholder="Type a message..." style="flex:1;" required />
    <button type="submit" class="btn primary">Send</button>
  </form>
</div>
